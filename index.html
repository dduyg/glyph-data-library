<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glyph Library Browser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .controls {
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        .control-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        .control-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #495057;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select, input {
            padding: 12px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s;
            background: white;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-active {
            background: #ff6b6b;
        }

        .btn-active:hover {
            background: #ee5a52;
        }

        .stats {
            padding: 20px 30px;
            background: #e7f3ff;
            border-bottom: 2px solid #bee5eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .stats-item {
            font-size: 1.1em;
            color: #004085;
        }

        .stats-item strong {
            color: #667eea;
            font-size: 1.3em;
        }

        .gallery {
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            min-height: 400px;
        }

        .glyph-card {
            background: white;
            border: 3px solid #e9ecef;
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .glyph-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-color: #667eea;
        }

        .glyph-card.selected {
            border-color: #28a745;
            background: #d4edda;
            box-shadow: 0 0 0 3px rgba(40, 167, 69, 0.2);
        }

        .glyph-card.selecting {
            cursor: pointer;
        }

        .glyph-card.selecting:hover {
            border-color: #ffc107;
        }

        .glyph-image {
            width: 100%;
            height: 120px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .glyph-info {
            text-align: center;
            width: 100%;
        }

        .glyph-color {
            width: 100%;
            height: 30px;
            border-radius: 6px;
            margin-bottom: 8px;
            border: 2px solid #dee2e6;
        }

        .glyph-meta {
            font-size: 0.75em;
            color: #6c757d;
            margin-top: 5px;
        }

        .glyph-badge {
            display: inline-block;
            padding: 3px 8px;
            background: #667eea;
            color: white;
            border-radius: 4px;
            font-size: 0.7em;
            margin: 2px;
            text-transform: uppercase;
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 1.5em;
            color: #6c757d;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #6c757d;
        }

        .empty-state svg {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 1.5em;
            font-weight: 700;
            margin-bottom: 20px;
            color: #212529;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        textarea {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.9em;
            resize: vertical;
        }

        .color-picker-wrapper {
            position: relative;
        }

        .color-preview {
            display: inline-block;
            width: 30px;
            height: 30px;
            border-radius: 6px;
            border: 2px solid #dee2e6;
            vertical-align: middle;
            margin-left: 10px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .control-row {
                grid-template-columns: 1fr;
            }
            
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Glyph Library</h1>
            <p>Explore, filter, and discover your visual assets</p>
        </div>

        <div class="controls">
            <div class="control-row">
                <div class="control-group">
                    <label>🎨 Color Search</label>
                    <select id="colorSearch">
                        <option value="">All Colors</option>
                        <option value="red">Red</option>
                        <option value="orange">Orange</option>
                        <option value="yellow">Yellow</option>
                        <option value="green">Green</option>
                        <option value="blue">Blue</option>
                        <option value="purple">Purple</option>
                        <option value="pink">Pink</option>
                        <option value="brown">Brown</option>
                        <option value="gold">Gold</option>
                        <option value="silver">Silver</option>
                        <option value="black">Black</option>
                        <option value="white">White</option>
                        <option value="gray">Gray</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>🎭 Filter By</label>
                    <select id="filterBy">
                        <option value="">No Filter</option>
                        <optgroup label="Mood">
                            <option value="mood:serene">Serene</option>
                            <option value="mood:calm">Calm</option>
                            <option value="mood:playful">Playful</option>
                            <option value="mood:energetic">Energetic</option>
                            <option value="mood:futuristic">Futuristic</option>
                            <option value="mood:mysterious">Mysterious</option>
                            <option value="mood:dramatic">Dramatic</option>
                            <option value="mood:chaotic">Chaotic</option>
                        </optgroup>
                        <optgroup label="Contrast">
                            <option value="contrast:low">Low Contrast (0.0-0.35)</option>
                            <option value="contrast:medium">Medium Contrast (0.35-0.65)</option>
                            <option value="contrast:high">High Contrast (0.65-1.0)</option>
                        </optgroup>
                        <optgroup label="Detail">
                            <option value="detail:minimal">Minimal Detail (edge < 0.3)</option>
                            <option value="detail:moderate">Moderate Detail (edge 0.3-0.5)</option>
                            <option value="detail:high">High Detail (edge > 0.5)</option>
                        </optgroup>
                        <optgroup label="Shape">
                            <option value="shape:circular">Circular (circularity > 0.7)</option>
                            <option value="shape:angular">Angular (circularity < 0.5)</option>
                            <option value="shape:square">Square (aspect 0.9-1.1)</option>
                            <option value="shape:wide">Wide (aspect > 1.5)</option>
                            <option value="shape:tall">Tall (aspect < 0.7)</option>
                        </optgroup>
                        <optgroup label="Texture">
                            <option value="texture:smooth">Smooth (texture < 1.0)</option>
                            <option value="texture:textured">Textured (texture > 1.5)</option>
                        </optgroup>
                        <optgroup label="Harmony">
                            <option value="harmony:analogous">Analogous Harmony</option>
                            <option value="harmony:complementary">Complementary Harmony</option>
                        </optgroup>
                    </select>
                </div>

                <div class="control-group">
                    <label>📊 Sort By</label>
                    <select id="sortBy">
                        <option value="newest">Newest First</option>
                        <option value="oldest">Oldest First</option>
                        <option value="contrast-high">Highest Contrast</option>
                        <option value="contrast-low">Lowest Contrast</option>
                        <option value="detail-high">Most Detailed</option>
                        <option value="detail-low">Least Detailed</option>
                        <option value="circular">Most Circular</option>
                        <option value="angular">Most Angular</option>
                        <option value="color-hue">Color Hue (Rainbow)</option>
                    </select>
                </div>

                <div class="control-group color-picker-wrapper">
                    <label>🔍 Similar Colors (LAB)</label>
                    <div style="display: flex; align-items: center;">
                        <input type="color" id="colorPicker" value="#667eea">
                        <span id="colorPreview" class="color-preview" style="background: #667eea;"></span>
                    </div>
                </div>
            </div>

            <div class="button-row">
                <button class="btn-primary" id="startSelect">Start Select</button>
                <button class="btn-secondary" id="clearFilters">Clear All Filters</button>
                <button class="btn-success" id="exportSelected" style="display: none;">Export Selected (<span id="selectedCount">0</span>)</button>
            </div>
        </div>

        <div class="stats">
            <div class="stats-item">
                Total Glyphs: <strong id="totalCount">0</strong>
            </div>
            <div class="stats-item">
                Showing: <strong id="showingCount">0</strong>
            </div>
            <div class="stats-item" id="selectionStats" style="display: none;">
                Selected: <strong id="selectedStats">0</strong>
            </div>
        </div>

        <div class="gallery" id="gallery">
            <div class="loading">Loading glyphs...</div>
        </div>
    </div>

    <div class="modal" id="exportModal">
        <div class="modal-content">
            <div class="modal-header">Export Selected Glyphs</div>
            <div class="modal-buttons">
                <button class="btn-primary" id="exportJSON">JSON</button>
                <button class="btn-primary" id="exportCSV">CSV</button>
                <button class="btn-success" id="copyURLs">Copy URLs</button>
                <button class="btn-secondary" id="closeModal">Cancel</button>
            </div>
            <textarea id="exportOutput" placeholder="Export data will appear here..." readonly></textarea>
        </div>
    </div>

    <script>
        const DATA_URL = `https://cdn.jsdelivr.net/gh/dduyg/glyph-data-library@main/data/glyphs.catalog.json`;

        let allGlyphs = [];
        let filteredGlyphs = [];
        let selectedGlyphs = new Set();
        let selectMode = false;

        // Load data
        async function loadGlyphs() {
            try {
                const response = await fetch(DATA_URL);
                const data = await response.json();
                allGlyphs = data.glyphs;
                filteredGlyphs = [...allGlyphs];
                
                document.getElementById('totalCount').textContent = allGlyphs.length;
                applyFilters();
            } catch (error) {
                document.getElementById('gallery').innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="12"></line>
                            <line x1="12" y1="16" x2="12.01" y2="16"></line>
                        </svg>
                        <h2>Failed to load glyphs</h2>
                        <p>Please check your configuration and try again.</p>
                        <p style="font-size: 0.9em; color: #dc3545;">${error.message}</p>
                    </div>
                `;
            }
        }

        // LAB color distance
        function labDistance(lab1, lab2) {
            const dL = lab1[0] - lab2[0];
            const da = lab1[1] - lab2[1];
            const db = lab1[2] - lab2[2];
            return Math.sqrt(dL * dL + da * da + db * db);
        }

        // Hex to LAB conversion
        function hexToLAB(hex) {
            const r = parseInt(hex.substr(1, 2), 16) / 255;
            const g = parseInt(hex.substr(3, 2), 16) / 255;
            const b = parseInt(hex.substr(5, 2), 16) / 255;

            const rL = r > 0.04045 ? Math.pow((r + 0.055) / 1.055, 2.4) : r / 12.92;
            const gL = g > 0.04045 ? Math.pow((g + 0.055) / 1.055, 2.4) : g / 12.92;
            const bL = b > 0.04045 ? Math.pow((b + 0.055) / 1.055, 2.4) : b / 12.92;

            let x = (rL * 0.4124 + gL * 0.3576 + bL * 0.1805) / 0.95047;
            let y = rL * 0.2126 + gL * 0.7152 + bL * 0.0722;
            let z = (rL * 0.0193 + gL * 0.1192 + bL * 0.9505) / 1.08883;

            x = x > 0.008856 ? Math.pow(x, 1/3) : 7.787 * x + 16/116;
            y = y > 0.008856 ? Math.pow(y, 1/3) : 7.787 * y + 16/116;
            z = z > 0.008856 ? Math.pow(z, 1/3) : 7.787 * z + 16/116;

            return [116 * y - 16, 500 * (x - y), 200 * (y - z)];
        }

        // Apply filters
        function applyFilters() {
            const colorSearch = document.getElementById('colorSearch').value;
            const filterBy = document.getElementById('filterBy').value;
            const sortBy = document.getElementById('sortBy').value;
            const colorPicker = document.getElementById('colorPicker').value;

            // Filter
            filteredGlyphs = allGlyphs.filter(glyph => {
                // Color group filter
                if (colorSearch && glyph.color.group !== colorSearch) return false;

                // Advanced filters
                if (filterBy) {
                    const [category, value] = filterBy.split(':');
                    
                    if (category === 'mood' && glyph.mood !== value) return false;
                    
                    if (category === 'contrast') {
                        const c = glyph.metrics.contrast;
                        if (value === 'low' && c >= 0.35) return false;
                        if (value === 'medium' && (c < 0.35 || c >= 0.65)) return false;
                        if (value === 'high' && c < 0.65) return false;
                    }
                    
                    if (category === 'detail') {
                        const e = glyph.metrics.edge_density;
                        if (value === 'minimal' && e >= 0.3) return false;
                        if (value === 'moderate' && (e < 0.3 || e >= 0.5)) return false;
                        if (value === 'high' && e < 0.5) return false;
                    }
                    
                    if (category === 'shape') {
                        const circ = glyph.metrics.circularity;
                        const ar = glyph.metrics.aspect_ratio;
                        if (value === 'circular' && circ <= 0.7) return false;
                        if (value === 'angular' && circ >= 0.5) return false;
                        if (value === 'square' && (ar < 0.9 || ar > 1.1)) return false;
                        if (value === 'wide' && ar <= 1.5) return false;
                        if (value === 'tall' && ar >= 0.7) return false;
                    }
                    
                    if (category === 'texture') {
                        const t = glyph.metrics.texture;
                        if (value === 'smooth' && t >= 1.0) return false;
                        if (value === 'textured' && t <= 1.5) return false;
                    }
                    
                    if (category === 'harmony' && glyph.color_harmony !== value) return false;
                }

                return true;
            });

            // Color similarity search
            if (colorPicker && colorPicker !== '#667eea') {
                const targetLAB = hexToLAB(colorPicker);
                filteredGlyphs = filteredGlyphs
                    .map(g => ({
                        ...g,
                        colorDistance: labDistance(targetLAB, g.color.lab)
                    }))
                    .sort((a, b) => a.colorDistance - b.colorDistance)
                    .slice(0, 50);
            }

            // Sort
            filteredGlyphs.sort((a, b) => {
                switch(sortBy) {
                    case 'newest':
                        return new Date(`${b.created_at.date}T${b.created_at.time}`) - 
                               new Date(`${a.created_at.date}T${a.created_at.time}`);
                    case 'oldest':
                        return new Date(`${a.created_at.date}T${a.created_at.time}`) - 
                               new Date(`${b.created_at.date}T${b.created_at.time}`);
                    case 'contrast-high':
                        return b.metrics.contrast - a.metrics.contrast;
                    case 'contrast-low':
                        return a.metrics.contrast - b.metrics.contrast;
                    case 'detail-high':
                        return b.metrics.edge_density - a.metrics.edge_density;
                    case 'detail-low':
                        return a.metrics.edge_density - b.metrics.edge_density;
                    case 'circular':
                        return b.metrics.circularity - a.metrics.circularity;
                    case 'angular':
                        return a.metrics.circularity - b.metrics.circularity;
                    case 'color-hue':
                        const hueA = rgbToHue(a.color.rgb);
                        const hueB = rgbToHue(b.color.rgb);
                        return hueA - hueB;
                    default:
                        return 0;
                }
            });

            renderGallery();
        }

        function rgbToHue(rgb) {
            const r = rgb[0] / 255;
            const g = rgb[1] / 255;
            const b = rgb[2] / 255;
            const max = Math.max(r, g, b);
            const min = Math.min(r, g, b);
            const delta = max - min;
            
            if (delta === 0) return 0;
            
            let hue;
            if (max === r) {
                hue = ((g - b) / delta) % 6;
            } else if (max === g) {
                hue = (b - r) / delta + 2;
            } else {
                hue = (r - g) / delta + 4;
            }
            
            return hue * 60;
        }

        // Render gallery
        function renderGallery() {
            const gallery = document.getElementById('gallery');
            document.getElementById('showingCount').textContent = filteredGlyphs.length;

            if (filteredGlyphs.length === 0) {
                gallery.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                        <h2>No glyphs found</h2>
                        <p>Try adjusting your filters</p>
                    </div>
                `;
                return;
            }

            gallery.innerHTML = filteredGlyphs.map(glyph => `
                <div class="glyph-card ${selectMode ? 'selecting' : ''} ${selectedGlyphs.has(glyph.id) ? 'selected' : ''}" 
                     data-id="${glyph.id}">
                    <img src="${glyph.glyph_url}" alt="${glyph.filename}" class="glyph-image">
                    <div class="glyph-info">
                        <div class="glyph-color" style="background: #${glyph.color.hex}"></div>
                        <div class="glyph-badge">${glyph.color.group}</div>
                        <div class="glyph-badge">${glyph.mood}</div>
                        <div class="glyph-meta">
                            Contrast: ${glyph.metrics.contrast.toFixed(2)}<br>
                            Detail: ${glyph.metrics.edge_density.toFixed(2)}
                        </div>
                    </div>
                </div>
            `).join('');

            // Add click handlers
            if (selectMode) {
                document.querySelectorAll('.glyph-card').forEach(card => {
                    card.addEventListener('click', toggleSelection);
                });
            }
        }

        // Toggle selection
        function toggleSelection(e) {
            if (!selectMode) return;
            
            const card = e.currentTarget;
            const id = card.dataset.id;
            
            if (selectedGlyphs.has(id)) {
                selectedGlyphs.delete(id);
                card.classList.remove('selected');
            } else {
                selectedGlyphs.add(id);
                card.classList.add('selected');
            }
            
            updateSelectionUI();
        }

        // Update selection UI
        function updateSelectionUI() {
            const count = selectedGlyphs.size;
            document.getElementById('selectedCount').textContent = count;
            document.getElementById('selectedStats').textContent = count;
            
            const exportBtn = document.getElementById('exportSelected');
            const selectionStats = document.getElementById('selectionStats');
            
            if (count > 0) {
                exportBtn.style.display = 'block';
                selectionStats.style.display = 'block';
            } else {
                exportBtn.style.display = 'none';
                selectionStats.style.display = 'none';
            }
        }

        // Export functions
        function exportJSON() {
            const selected = allGlyphs.filter(g => selectedGlyphs.has(g.id));
            document.getElementById('exportOutput').value = JSON.stringify(selected, null, 2);
        }

        function exportCSV() {
            const selected = allGlyphs.filter(g => selectedGlyphs.has(g.id));
            const headers = ['id', 'filename', 'glyph_url', 'color_hex', 'color_group', 'contrast', 'edge_density', 'mood'];
            const csv = [
                headers.join(','),
                ...selected.map(g => [
                    g.id,
                    g.filename,
                    g.glyph_url,
                    g.color.hex,
                    g.color.group,
                    g.metrics.contrast,
                    g.metrics.edge_density,
                    g.mood
                ].join(','))
            ].join('\n');
            document.getElementById('exportOutput').value = csv;
        }

        function copyURLs() {
            const selected = allGlyphs.filter(g => selectedGlyphs.has(g.id));
            const urls = selected.map(g => g.glyph_url).join('\n');
            navigator.clipboard.writeText(urls);
            alert('URLs copied to clipboard!');
        }

        // Event listeners
        document.getElementById('colorSearch').addEventListener('change', applyFilters);
        document.getElementById('filterBy').addEventListener('change', applyFilters);
        document.getElementById('sortBy').addEventListener('change', applyFilters);
        document.getElementById('colorPicker').addEventListener('change', (e) => {
            document.getElementById('colorPreview').style.background = e.target.value;
            applyFilters();
        });

        document.getElementById('clearFilters').addEventListener('click', () => {
            document.getElementById('colorSearch').value = '';
            document.getElementById('filterBy').value = '';
            document.getElementById('sortBy').value = 'newest';
            document.getElementById('colorPicker').value = '#667eea';
            document.getElementById('colorPreview').style.background = '#667eea';
            applyFilters();
        });

        document.getElementById('startSelect').addEventListener('click', () => {
            selectMode = !selectMode;
            const btn = document.getElementById('startSelect');
            
            if (selectMode) {
                btn.textContent = 'Stop Select';
                btn.classList.remove('btn-primary');
                btn.classList.add('btn-active');
            } else {
                btn.textContent = 'Start Select';
                btn.classList.remove('btn-active');
                btn.classList.add('btn-primary');
                selectedGlyphs.clear();
                updateSelectionUI();
            }
            
            renderGallery();
        });

        document.getElementById('exportSelected').addEventListener('click', () => {
            document.getElementById('exportModal').classList.add('active');
            document.getElementById('exportOutput').value = '';
        });

        document.getElementById('closeModal').addEventListener('click', () => {
            document.getElementById('exportModal').classList.remove('active');
        });

        document.getElementById('exportJSON').addEventListener('click', exportJSON);
        document.getElementById('exportCSV').addEventListener('click', exportCSV);
        document.getElementById('copyURLs').addEventListener('click', copyURLs);

        // Close modal on outside click
        document.getElementById('exportModal').addEventListener('click', (e) => {
            if (e.target.id === 'exportModal') {
                document.getElementById('exportModal').classList.remove('active');
            }
        });

        // Initialize
        loadGlyphs();
    </script>
</body>
</html>
