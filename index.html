<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glyph Library Gallery</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            padding: 25px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 12px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control-group label {
            font-weight: 600;
            color: #555;
        }

        input[type="color"] {
            width: 70px;
            height: 50px;
            border: 3px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        input[type="color"]:hover {
            border-color: #667eea;
            transform: scale(1.05);
        }

        input[type="text"] {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-family: monospace;
            font-size: 16px;
            width: 130px;
            transition: border 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        input[type="range"] {
            width: 220px;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: #ddd;
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #667eea;
            border-radius: 50%;
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: #667eea;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        .tolerance-value {
            min-width: 35px;
            font-weight: 600;
            color: #667eea;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 15px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #28a745;
            color: white;
        }

        .btn-secondary:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .stats {
            text-align: center;
            margin-bottom: 25px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            color: #666;
            font-size: 15px;
            font-weight: 500;
        }

        .stats strong {
            color: #667eea;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .glyph-card {
            background: #fff;
            border: 3px solid #e9ecef;
            border-radius: 15px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .glyph-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
            border-color: #667eea;
        }

        .glyph-card.selected {
            border-color: #28a745;
            background: #e8f5e9;
            box-shadow: 0 8px 25px rgba(40, 167, 69, 0.3);
        }

        .glyph-card img {
            width: 100%;
            height: 120px;
            object-fit: contain;
            margin-bottom: 12px;
        }

        .glyph-info {
            text-align: center;
            font-size: 12px;
        }

        .color-preview {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .color-badge {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid #ddd;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .hex-code {
            font-weight: 600;
            font-family: monospace;
            font-size: 11px;
            color: #555;
        }

        .color-name {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 10px;
            text-transform: uppercase;
            margin-top: 6px;
        }

        .distance {
            font-size: 10px;
            color: #999;
            margin-top: 4px;
            font-style: italic;
        }

        .selection-bar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 18px 35px;
            border-radius: 50px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            display: none;
            align-items: center;
            gap: 20px;
            z-index: 1000;
        }

        .selection-bar.visible {
            display: flex;
            animation: slideUp 0.3s;
        }
        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        .selection-count {
            font-weight: 700;
            color: #28a745;
            font-size: 16px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal.visible {
            display: flex;
        }
        .modal-content {
            background: white;
            padding: 35px;
            border-radius: 15px;
            max-width: 900px;
            max-height: 85vh;
            overflow: auto;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 32px;
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
        }
        .modal-close:hover {
            color: #333;
        }
        .modal h2 {
            margin-bottom: 10px;
            color: #333;
        }
        .modal p {
            color: #666;
            margin-bottom: 15px;
        }

        textarea {
            width: 100%;
            height: 450px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            padding: 20px;
            border: 2px solid #ddd;
            border-radius: 10px;
            margin-top: 15px;
            resize: vertical;
        }

        .toast {
            position: fixed;
            top: 30px;
            right: 30px;
            background: #28a745;
            color: white;
            padding: 18px 30px;
            border-radius: 10px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            display: none;
            z-index: 3000;
            font-weight: 600;
        }

        .toast.visible {
            display: block;
            animation: slideIn 0.4s;
        }

        @keyframes slideIn {
            from { transform: translateX(500px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Glyph Library</h1>
        <p class="subtitle">Color-Based Search Gallery</p>

        <div class="controls">
            <div class="control-group">
                <label>Color:</label>
                <input type="color" id="colorPicker" value="#667eea">
                <input type="text" id="hexInput" value="#667eea" placeholder="#667eea" maxlength="7">
            </div>

            <div class="control-group">
                <label>Tolerance:</label>
                <input type="range" id="tolerance" min="5" max="100" value="30">
                <span class="tolerance-value" id="toleranceValue">30</span>
            </div>

            <button class="btn-primary" onclick="applyFilters()">🔍 Search</button>
            <button class="btn-primary" onclick="resetFilters()">↺ Reset</button>
        </div>

        <div class="stats" id="statsBar">
            <span id="statsText">Loading glyphs...</span>
        </div>

        <div class="gallery" id="gallery"></div>
    </div>

    <div class="selection-bar" id="selectionBar">
        <span class="selection-count">✓ <span id="selectedCount">0</span> selected</span>
        <button class="btn-secondary" onclick="exportSelection()">📋 Copy Dataset</button>
        <button class="btn-secondary" onclick="downloadSelection()">💾 Download JSON</button>
        <button class="btn-danger" onclick="clearSelection()">✕ Clear</button>
    </div>

    <div class="modal" id="exportModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">×</span>
            <h2>📋 Export Dataset</h2>
            <p>Copy this JSON data to use in your project:</p>
            <textarea id="exportData" readonly></textarea>
            <button class="btn-primary" onclick="copyToClipboard()" style="margin-top: 15px; width: 100%;">📋 Copy to Clipboard</button>
        </div>
    </div>

    <div class="toast" id="toast">✓ Copied to clipboard!</div>

    <script>
        // Load glyph data from JSON file
        let allGlyphs = [];
        let filteredGlyphs = [];
        let selectedGlyphs = new Set();

        // Fetch data from JSON file
        async function loadGlyphData() {
            try {
                const response = await fetch('data/glyphs-metadata.json');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                allGlyphs = data.glyphs;
                filteredGlyphs = [...allGlyphs];
                
                // Initialize gallery after data loads
                init();
            } catch (error) {
                console.error('Error loading glyph data:', error);
                document.getElementById('statsText').innerHTML = 
                    '❌ <strong>Error loading glyphs.</strong> Make sure data/glyphs-metadata.json exists.';
                document.getElementById('gallery').innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <h3>Failed to load glyph data</h3>
                        <p>Check that <code>data/glyphs-metadata.json</code> exists in your repository.</p>
                        <p style="color: #dc3545; margin-top: 10px;">Error: ${error.message}</p>
                    </div>
                `;
            }
        }

        // Color distance calculation (LAB color space)
        function hexToRgb(hex) {
            hex = hex.replace('#', '');
            return {
                r: parseInt(hex.substring(0, 2), 16),
                g: parseInt(hex.substring(2, 4), 16),
                b: parseInt(hex.substring(4, 6), 16)
            };
        }

        function rgbToLab(rgb) {
            let r = rgb.r / 255, g = rgb.g / 255, b = rgb.b / 255;
            r = r > 0.04045 ? Math.pow((r + 0.055) / 1.055, 2.4) : r / 12.92;
            g = g > 0.04045 ? Math.pow((g + 0.055) / 1.055, 2.4) : g / 12.92;
            b = b > 0.04045 ? Math.pow((b + 0.055) / 1.055, 2.4) : b / 12.92;

            let x = (r * 0.4124564 + g * 0.3575761 + b * 0.1804375) / 0.95047;
            let y = (r * 0.2126729 + g * 0.7151522 + b * 0.0721750) / 1.00000;
            let z = (r * 0.0193339 + g * 0.1191920 + b * 0.9503041) / 1.08883;

            const f = t => t > 0.008856 ? Math.pow(t, 1/3) : (7.787 * t + 16/116);
            const L = 116 * f(y) - 16;
            const a = 500 * (f(x) - f(y));
            const bLab = 200 * (f(y) - f(z));
            return { L, a, b: bLab };
        }

        function colorDistance(hex1, hex2) {
            const lab1 = rgbToLab(hexToRgb(hex1));
            const lab2 = rgbToLab(hexToRgb(hex2));
            const dL = lab1.L - lab2.L;
            const da = lab1.a - lab2.a;
            const db = lab1.b - lab2.b;
            return Math.sqrt(dL * dL + da * da + db * db);
        }

        // Initialize
        function init() {
            renderGallery(allGlyphs);
            updateStats();

            // Sync color picker and hex input
            document.getElementById('colorPicker').addEventListener('input', (e) => {
                document.getElementById('hexInput').value = e.target.value;
            });

            document.getElementById('hexInput').addEventListener('input', (e) => {
                let value = e.target.value;
                if (!value.startsWith('#')) value = '#' + value;
                document.getElementById('colorPicker').value = value;
            });

            document.getElementById('tolerance').addEventListener('input', (e) => {
                document.getElementById('toleranceValue').textContent = e.target.value;
            });
        }

        function applyFilters() {
            let targetColor = document.getElementById('hexInput').value;
            if (!targetColor.startsWith('#')) targetColor = '#' + targetColor;
            
            const tolerance = parseInt(document.getElementById('tolerance').value);

            filteredGlyphs = allGlyphs.filter(glyph => {
                const distance = colorDistance(targetColor, glyph.hex);
                
                if (distance <= tolerance) {
                    glyph.colorDistance = Math.round(distance * 10) / 10;
                    return true;
                }
                return false;
            });

            // Sort by similarity (closest colors first)
            filteredGlyphs.sort((a, b) => (a.colorDistance || 0) - (b.colorDistance || 0));
            renderGallery(filteredGlyphs);
            updateStats();
        }

        function resetFilters() {
            document.getElementById('colorPicker').value = '#667eea';
            document.getElementById('hexInput').value = '#667eea';
            document.getElementById('tolerance').value = 30;
            document.getElementById('toleranceValue').textContent = '30';
            filteredGlyphs = [...allGlyphs];
            filteredGlyphs.forEach(g => delete g.colorDistance);
            renderGallery(filteredGlyphs);
            updateStats();
        }

        function renderGallery(glyphs) {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';

            if (glyphs.length === 0) {
                gallery.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                        <h3>No glyphs found</h3>
                        <p>Try adjusting the color or increasing the tolerance</p>
                    </div>
                `;
                return;
            }

            glyphs.forEach(glyph => {
                const card = document.createElement('div');
                card.className = 'glyph-card';
                if (selectedGlyphs.has(glyph.id)) {
                    card.classList.add('selected');
                }

                card.innerHTML = `
                    <img src="${glyph.glyph_url}" alt="Glyph ${glyph.hex}" loading="lazy">
                    <div class="glyph-info">
                        <div class="color-preview">
                            <div class="color-badge" style="background: ${glyph.hex};"></div>
                            <div class="hex-code">${glyph.hex}</div>
                        </div>
                        <span class="color-name">${glyph.colorName}</span>
                        ${glyph.colorDistance !== undefined ? `<div class="distance">Similarity: Δ${glyph.colorDistance}</div>` : ''}
                    </div>
                `;

                card.addEventListener('click', (e) => {
                    if (e.shiftKey || e.ctrlKey || e.metaKey) {
                        toggleSelection(glyph, card);
                    } else {
                        copyGlyphUrl(glyph);
                    }
                });

                gallery.appendChild(card);
            });
        }

        function toggleSelection(glyph, card) {
            if (selectedGlyphs.has(glyph.id)) {
                selectedGlyphs.delete(glyph.id);
                card.classList.remove('selected');
            } else {
                selectedGlyphs.add(glyph.id);
                card.classList.add('selected');
            }
            updateSelectionBar();
        }

        function updateSelectionBar() {
            const bar = document.getElementById('selectionBar');
            const count = document.getElementById('selectedCount');
            count.textContent = selectedGlyphs.size;
            
            if (selectedGlyphs.size > 0) {
                bar.classList.add('visible');
            } else {
                bar.classList.remove('visible');
            }
        }

        function clearSelection() {
            selectedGlyphs.clear();
            document.querySelectorAll('.glyph-card').forEach(card => {
                card.classList.remove('selected');
            });
            updateSelectionBar();
        }

        function copyGlyphUrl(glyph) {
            navigator.clipboard.writeText(glyph.glyph_url);
            showToast(`✓ URL copied: ${glyph.hex}`);
        }

        function exportSelection() {
            const selected = allGlyphs.filter(g => selectedGlyphs.has(g.id));
            const data = JSON.stringify(selected, null, 2);
            document.getElementById('exportData').value = data;
            document.getElementById('exportModal').classList.add('visible');
        }

        function downloadSelection() {
            const selected = allGlyphs.filter(g => selectedGlyphs.has(g.id));
            const data = JSON.stringify(selected, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `glyph-selection-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('✓ Dataset downloaded!');
        }

        function copyToClipboard() {
            const textarea = document.getElementById('exportData');
            textarea.select();
            document.execCommand('copy');
            closeModal();
            showToast('✓ Dataset copied to clipboard!');
        }

        function closeModal() {
            document.getElementById('exportModal').classList.remove('visible');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('visible');
            setTimeout(() => toast.classList.remove('visible'), 2500);
        }

        function updateStats() {
            const total = allGlyphs.length;
            const filtered = filteredGlyphs.length;
            const colors = new Set(filteredGlyphs.map(g => g.colorName)).size;
            document.getElementById('statsText').innerHTML = 
                `Showing <strong>${filtered}</strong> of <strong>${total}</strong> glyphs • <strong>${colors}</strong> color families`;
        }

        // Load data and initialize on page load
        loadGlyphData();
    </script>
</body>
</html>
